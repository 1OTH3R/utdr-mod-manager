<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">

<body>
    <div id="head">
        <h1>UT / DR Mod Manager</h1>
        <p style="font-size: calc(0.9vw + 0.9vh);">By <a tabindex="-1" style="font-size: calc(0.9vw + 0.9vh); color: #ff0000;" href="#" onclick="nw.Shell.openExternal('https://linktr.ee/1OTH3R')">1OTH3R</a></p>
    </div>
    
    <div id="menu" style="border-bottom-width: 0px; grid-area: menu;">
        <div title="Add Mod" tabindex="0" role="button" class="button clickableItemP2" onclick="playSound('click'); setLoading(true); addMod(true);" onfocus="playSound('hover');" onmouseenter="playSound('hover');"><img class="no-interact" src="add.png"></div>
        <div title="Play Mod" tabindex="0" role="button" class="button clickableItemP2" onclick="playSound('click'); prepGame();" onfocus="playSound('hover');" onmouseenter="playSound('hover');"><img class="no-interact" src="play.png"></div>
        <div title="View Files" tabindex="0" role="button" class="button clickableItemP2" onclick="playSound('click'); openFiles();" onfocus="playSound('hover');" onmouseenter="playSound('hover');"><img class="no-interact" src="files.png"></div>
        <div title="Delete Mod" tabindex="0" role="button" class="button clickableItemP2 red-button" onclick="playSound('slash'); removeMod();" onfocus="playSound('hover');" onmouseenter="playSound('hover');"><img class="no-interact" class="red" src="delete.png"></div>
    </div>
